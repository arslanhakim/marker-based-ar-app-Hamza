<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Marker AR Robot</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1f6feb" />
    <meta name="description" content="Marker-based AR: point your camera at the marker to bring a 3D robot to life." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AR Robot" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        /* Block the browser's own pinch-zoom / double-tap-zoom during the demo. */
        touch-action: none;
        overscroll-behavior: none;
      }

      /* Full-screen stage. MindAR injects its own <video> feed and the
         Three.js <canvas> into this container and sizes them to cover. */
      #ar-container {
        position: fixed;
        inset: 0;
        overflow: hidden;
        touch-action: none;
      }

      /* The AR canvas must not capture browser gestures either. */
      #ar-container canvas {
        touch-action: none;
      }

      /* Status pill — scaffolding aid, removed in a later polish phase. */
      #status {
        position: fixed;
        left: 50%;
        top: max(12px, env(safe-area-inset-top));
        transform: translateX(-50%);
        z-index: 10;
        font: 14px system-ui, -apple-system, sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        padding: 7px 16px;
        border-radius: 999px;
        pointer-events: none;
        white-space: nowrap;
      }

      /* On-screen UI button — part of the camera view, sits above the AR canvas. */
      #switch-btn {
        position: fixed;
        left: 50%;
        bottom: max(24px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 10;
        font: 600 16px system-ui, -apple-system, sans-serif;
        color: #fff;
        background: #1f6feb;
        border: none;
        padding: 14px 28px;
        border-radius: 999px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        transition: opacity 0.15s ease, transform 0.05s ease;
      }

      #switch-btn:active {
        transform: translateX(-50%) scale(0.96);
      }

      #switch-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Diagnostic indicator (top-left): shows the TRIGGER marker (anchor 1)
         tracking state in real time, independent of the base marker. */
      #trigger-status {
        position: fixed;
        left: max(10px, env(safe-area-inset-left));
        top: max(10px, env(safe-area-inset-top));
        z-index: 11;
        font: 600 12px system-ui, -apple-system, sans-serif;
        color: #fff;
        background: rgba(90, 90, 90, 0.85); /* grey = not detected */
        padding: 6px 10px;
        border-radius: 8px;
        pointer-events: none;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #trigger-status::before {
        content: '';
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #c0c0c0;
      }

      #trigger-status.detected {
        background: rgba(17, 122, 55, 0.9); /* green = detected */
      }

      #trigger-status.detected::before {
        background: #36e07a;
      }

      /* Hint line explaining the triggers, just above the button. */
      #hint {
        position: fixed;
        left: 50%;
        bottom: calc(max(24px, env(safe-area-inset-bottom)) + 60px);
        transform: translateX(-50%);
        z-index: 10;
        width: min(92vw, 460px);
        text-align: center;
        font: 13px system-ui, -apple-system, sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 14px;
        border-radius: 12px;
        pointer-events: none;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <div id="ar-container"></div>
    <div id="status">Loading…</div>
    <div id="trigger-status">TRIGGER: not detected</div>
    <div id="hint">
      Tap the robot or press the button to switch its action — or show the
      <strong>2nd image (trigger)</strong> to the camera to change it.
    </div>
    <button id="switch-btn" disabled>Switch Animation</button>

    <script type="module" src="/main.js"></script>
  </body>
</html>
