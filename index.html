<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Marker AR Robot</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1f6feb" />
    <meta name="description" content="Marker-based AR: point your camera at the marker to bring a 3D robot to life." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AR Robot" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        /* Block the browser's own pinch-zoom / double-tap-zoom during the demo. */
        touch-action: none;
        overscroll-behavior: none;
      }

      /* Full-screen stage. MindAR injects its own <video> feed and the
         Three.js <canvas> into this container and sizes them to cover. */
      #ar-container {
        position: fixed;
        inset: 0;
        overflow: hidden;
        touch-action: none;
      }

      /* The AR canvas must not capture browser gestures either. */
      #ar-container canvas {
        touch-action: none;
      }

      /* Status pill — scaffolding aid, removed in a later polish phase. */
      #status {
        position: fixed;
        left: 50%;
        top: max(12px, env(safe-area-inset-top));
        transform: translateX(-50%);
        z-index: 10;
        font: 14px system-ui, -apple-system, sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        padding: 7px 16px;
        border-radius: 999px;
        pointer-events: none;
        white-space: nowrap;
      }

      /* On-screen UI button — part of the camera view, sits above the AR canvas. */
      #switch-btn {
        position: fixed;
        left: 50%;
        bottom: max(24px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 10;
        font: 600 16px system-ui, -apple-system, sans-serif;
        color: #fff;
        background: #1f6feb;
        border: none;
        padding: 14px 28px;
        border-radius: 999px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        transition: opacity 0.15s ease, transform 0.05s ease;
      }

      #switch-btn:active {
        transform: translateX(-50%) scale(0.96);
      }

      #switch-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="ar-container"></div>
    <div id="status">Loading…</div>
    <button id="switch-btn" disabled>Switch Animation</button>

    <script type="module" src="/main.js"></script>
  </body>
</html>
