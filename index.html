<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>AR App — Phase 2 Marker</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      /* Full-screen stage. MindAR injects its own <video> feed and the
         Three.js <canvas> into this container and sizes them to cover. */
      #ar-container {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      /* Status pill — scaffolding aid, removed in a later polish phase. */
      #status {
        position: fixed;
        left: 50%;
        top: max(12px, env(safe-area-inset-top));
        transform: translateX(-50%);
        z-index: 10;
        font: 14px system-ui, -apple-system, sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        padding: 7px 16px;
        border-radius: 999px;
        pointer-events: none;
        white-space: nowrap;
      }

      /* On-screen UI button — part of the camera view, sits above the AR canvas. */
      #switch-btn {
        position: fixed;
        left: 50%;
        bottom: max(24px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 10;
        font: 600 16px system-ui, -apple-system, sans-serif;
        color: #fff;
        background: #1f6feb;
        border: none;
        padding: 14px 28px;
        border-radius: 999px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        transition: opacity 0.15s ease, transform 0.05s ease;
      }

      #switch-btn:active {
        transform: translateX(-50%) scale(0.96);
      }

      #switch-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="ar-container"></div>
    <div id="status">Loading…</div>
    <button id="switch-btn" disabled>Switch Animation</button>

    <script type="module" src="/main.js"></script>
  </body>
</html>
